<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SiBangla WebGIS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:Segoe UI; }
#map { height:92vh; }

.header {
  padding:6px 10px;
  background:#2f5fa7;
  color:white;
  font-weight:bold;
}

.topbar {
  display:flex;
  gap:6px;
  padding:6px;
  background:#3f6fb5;
  align-items:center;
}

.search-box {
  display:flex;
  background:white;
  border-radius:4px;
  overflow:hidden;
}
.search-box input { border:none; padding:5px; outline:none; }
.search-box button { border:none; background:#ddd; padding:5px 10px; cursor:pointer; }

.btn {
  background:rgba(255,255,255,0.2);
  border:none;
  color:white;
  padding:5px 10px;
  border-radius:4px;
  cursor:pointer;
}

/* PANEL */
.panel {
  position:absolute;
  top:100px;
  left:20px;
  background:white;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
  z-index:1000;
  font-size:13px;
  width:220px;
}
.panel-header {
  padding:5px;
  background:#eee;
  cursor:move;
  font-weight:bold;
}
.panel-body { padding:10px; }

#legend { top:350px; left:20px; }
#layerPanel { top:100px; left:250px; }
#inputPanel { top:100px; left:480px; display:none; }
#uploadPanel { top:100px; left:720px; display:none; }
#minimapPanel { top:350px; left:250px; display:none; }

</style>
</head>

<body>

<div class="header">SiBangla WebGIS</div>

<div class="topbar">
  <div class="search-box">
    <input id="searchBox" placeholder="Find location...">
    <button onclick="searchLocation()">🔍</button>
  </div>

  <button class="btn" onclick="toggle('inputPanel')">Input Point</button>
  <button class="btn" onclick="toggle('uploadPanel')">My Location</button>
  <button class="btn" onclick="toggle('layerPanel')">Layer</button>
  <button class="btn" onclick="toggle('minimapPanel')">Mini Map</button>
  <button class="btn" onclick="resetAll()">Reset</button>

  <button class="btn" style="margin-left:auto" onclick="toggle('helpPanel')">Info / Help</button>
</div>

<div id="map"></div>

<!-- INPUT -->
<div id="inputPanel" class="panel">
<div class="panel-header">Input Point</div>
<div class="panel-body">
<b>Decimal Degrees</b><br>
Lat <input id="latInput"><br>
Lng <input id="lngInput"><br>
<button onclick="addMarkerDD()">OK</button>
<hr>
<b>DMS</b><br>
Lat:
<select id="latDir"><option value="1">N</option><option value="-1">S</option></select>
<input id="latDeg" size="2">°
<input id="latMin" size="2">'
<input id="latSec" size="2">"<br>
Lng:
<select id="lngDir"><option value="1">E</option><option value="-1">W</option></select>
<input id="lngDeg" size="2">°
<input id="lngMin" size="2">'
<input id="lngSec" size="2">"<br>
<button onclick="addMarkerDMS()">OK DMS</button>
</div>
</div>

<!-- UPLOAD -->
<div id="uploadPanel" class="panel">
<div class="panel-header">My Location</div>
<div class="panel-body">
CSV <input type="file" id="csvFile"><br>
<button onclick="loadCSV()">Load CSV</button><br><br>
GeoJSON <input type="file" id="geojsonFile"><br>
<button onclick="loadGeoJSON()">Load GeoJSON</button>
</div>
</div>

<!-- LAYER -->
<div id="layerPanel" class="panel">
<div class="panel-header">Layer & Basemap</div>
<div class="panel-body" id="layerList"></div>
</div>

<!-- LEGEND -->
<div id="legend" class="panel">
<div class="panel-header">Legenda</div>
<div class="panel-body" id="legendContent"></div>
</div>

<!-- MINIMAP -->
<div id="minimapPanel" class="panel">
<div class="panel-header">Mini Map</div>
<div id="miniMap" style="height:120px;"></div>
</div>

<!-- HELP -->
<div id="helpPanel" class="panel" style="top:100px; right:20px; left:auto; display:none;">
<div class="panel-header">Help</div>
<div class="panel-body">
- Search lokasi<br>
- Input DD / DMS<br>
- Upload CSV / GeoJSON<br>
- Draw: digitasi<br>
- Measure: garis/polygon → otomatis hitung<br>
</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script>

// ================= MAP =================
const map = L.map('map').setView([-2.5,118],5);

const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
osm.addTo(map);

// scale + posisi naik
L.control.scale({position:'bottomleft'}).addTo(map);

// north arrow
const north = L.control({position:"bottomleft"});
north.onAdd = function(){
  const div = L.DomUtil.create("div");
  div.innerHTML = "⬆️ N";
  div.style.background="white";
  div.style.padding="4px";
  div.style.marginBottom="30px";
  return div;
};
north.addTo(map);

// ================= SEARCH =================
searchBox.addEventListener("keypress", e=>{
  if(e.key==="Enter") searchLocation();
});

async function searchLocation(){
  const q = searchBox.value;
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
  const d = await res.json();
  if(d.length) map.setView([d[0].lat,d[0].lon],12);
}

// ================= DRAW & MEASURE =================
const drawnItems = new L.FeatureGroup().addTo(map);

const drawControl = new L.Control.Draw({
  draw:{
    polygon:true,
    polyline:true,
    rectangle:true,
    marker:true
  },
  edit:{featureGroup:drawnItems}
});
map.addControl(drawControl);

map.on(L.Draw.Event.CREATED, e=>{
  const layer = e.layer;
  drawnItems.addLayer(layer);

  if(layer instanceof L.Polyline){
    let dist = 0;
    const latlngs = layer.getLatLngs();
    for(let i=1;i<latlngs.length;i++){
      dist += latlngs[i-1].distanceTo(latlngs[i]);
    }
    layer.bindPopup("Jarak: "+(dist/1000).toFixed(2)+" km").openPopup();
  }

  if(layer instanceof L.Polygon){
    const area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
    layer.bindPopup("Luas: "+(area/1000000).toFixed(2)+" km²").openPopup();
  }
});

// ================= INPUT =================
function addMarkerDD(){
  const lat = +latInput.value;
  const lng = +lngInput.value;
  if(!lat || !lng) return;
  L.marker([lat,lng]).addTo(drawnItems);
  map.setView([lat,lng],12);
}

function dms(d,m,s,dir){
  return dir*(Math.abs(d)+(m/60)+(s/3600));
}

function addMarkerDMS(){
  const lat = dms(+latDeg.value,+latMin.value,+latSec.value,+latDir.value);
  const lng = dms(+lngDeg.value,+lngMin.value,+lngSec.value,+lngDir.value);
  L.marker([lat,lng]).addTo(drawnItems);
  map.setView([lat,lng],12);
}

// ================= UPLOAD =================
function loadCSV(){
  const r = new FileReader();
  r.onload = e=>{
    e.target.result.split("\n").forEach(l=>{
      const [lat,lng]=l.split(",");
      if(lat && lng) L.marker([+lat,+lng]).addTo(drawnItems);
    });
  };
  r.readAsText(csvFile.files[0]);
}

function loadGeoJSON(){
  const r = new FileReader();
  r.onload = e=>{
    const layer = L.geoJSON(JSON.parse(e.target.result));
    drawnItems.addLayer(layer);
    map.fitBounds(layer.getBounds());
  };
  r.readAsText(geojsonFile.files[0]);
}

// ================= LAYER + LEGEND =================
let activeLayers = new Set();

function updateLegend(){
  const el = document.getElementById("legendContent");
  if(activeLayers.size===0){
    el.innerHTML="<i>Tidak ada layer aktif</i>";
    return;
  }
  el.innerHTML="";
  activeLayers.forEach(name=>{
    el.innerHTML += `<div>■ ${name}</div>`;
  });
}

// ================= MINIMAP =================
const miniMap = L.map('miniMap',{zoomControl:false, attributionControl:false});
miniMap.setView([-2.5,118],3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);

let rect = L.rectangle(map.getBounds(),{
  color:'red',weight:2,fill:false
}).addTo(miniMap);

map.on('move', ()=> rect.setBounds(map.getBounds()));

// ================= UI =================
function toggle(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display==="none"?"block":"none";
  if(id==="minimapPanel") setTimeout(()=> miniMap.invalidateSize(),300);
}

function resetAll(){
  drawnItems.clearLayers();
}

// drag panel
document.querySelectorAll('.panel').forEach(el=>{
  const header = el.querySelector('.panel-header');
  header.onmousedown = e=>{
    let x = e.clientX - el.offsetLeft;
    let y = e.clientY - el.offsetTop;
    document.onmousemove = e=>{
      el.style.left = (e.clientX - x)+"px";
      el.style.top = (e.clientY - y)+"px";
    };
    document.onmouseup = ()=> document.onmousemove=null;
  };
});

</script>

</body>
</html>
