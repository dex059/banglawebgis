<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SiBangla WebGIS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:Segoe UI; }

.header {
  padding:10px;
  background:#2f5fa7;
  color:white;
  font-weight:bold;
  font-size:20px;
}

.topbar {
  display:flex;
  gap:6px;
  padding:6px;
  background:#3f6fb5;
  align-items:center;
}

#map { height: calc(100vh - 80px); }

.search-box {
  display:flex;
  background:white;
  border-radius:4px;
  overflow:hidden;
}
.search-box input { border:none; padding:5px; outline:none; }
.search-box button { border:none; background:#ddd; padding:5px 10px; cursor:pointer; }

.btn {
  background:rgba(255,255,255,0.2);
  border:none;
  color:white;
  padding:5px 10px;
  border-radius:4px;
  cursor:pointer;
}

/* PANEL */
.panel {
  position:absolute;
  top:100px;
  left:20px;
  background:white;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
  z-index:1000;
  font-size:13px;
  width:230px;
  display:none;
}
.panel-header {
  padding:5px;
  background:#eee;
  cursor:move;
  font-weight:bold;
}
.panel-body { padding:10px; }

/* posisi */
#minimapPanel { top:100px; right:20px; left:auto; }
#layerPanel { top:260px; right:20px; left:auto; }
#legend { top:450px; right:20px; left:auto; }

/* resizeable panel */
#minimapPanel {
  resize: both;
  overflow: auto;
}
#layerPanel {
  resize: both;
  overflow: auto;
}
#legend {
  resize: both;
  overflow: auto;
}
  
/* dropdown */
.dropdown {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:12px;
  border-radius:8px;
  z-index:1000;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  display: none;
} 

/* no overflow */
.panel {
  max-width:90vw;
  max-height:80vh;
  overflow:auto;
}

/*draw*/
.leaflet-touch .leaflet-div-icon{
  width:8px !important;
  height:8px !important;
  margin-left:-4px !important;
  margin-top:-4px !important;
  border-radius:50%;
  background:#ffffff;
  border:2px solid #2f5fa7;
}

.leaflet-editing-icon{
  width:8px !important;
  height:8px !important;
}

  
</style>
</head>

<body>

<div class="header">SiBangla WebGIS</div>

<div class="topbar">

  <div class="search-box">
    <input id="searchBox" placeholder="Find location...">
    <button onclick="searchLocation()">🔍</button>
  </div>

  <button class="btn" onclick="toggle('inputPanel')">Input Point</button>
  <button class="btn" onclick="toggle('uploadPanel')">My Location</button>
  <button class="btn" onclick="toggle('layerPanel')">Layers & Basemap</button>
  <button class="btn" onclick="toggle('legend')">Legend</button>
  <button class="btn" onclick="toggle('minimapPanel')">Mini Map</button>

  <!-- kanan -->
  <button class="btn" style="margin-left:auto" onclick="resetAll()">Reset</button>
  <button class="btn" onclick="toggle('helpPanel')">Info / Help</button>

</div>

<div id="map"></div>

<!-- INPUT -->
<div id="inputPanel" class="dropdown">
<div class="panel-header">Input Point</div>
<div class="panel-body">

<b>Decimal Degrees</b><br>
Lat <input id="latInput"><br>
Lng <input id="lngInput"><br>
<button onclick="addMarkerDD()">OK</button>

<hr>

<b>DMS</b><br>
Lat:
<select id="latDir"><option value="1">N</option><option value="-1">S</option></select>
<input id="latDeg" size="2">°
<input id="latMin" size="2">'
<input id="latSec" size="2">"<br>

Lng:
<select id="lngDir"><option value="1">E</option><option value="-1">W</option></select>
<input id="lngDeg" size="2">°
<input id="lngMin" size="2">'
<input id="lngSec" size="2">"<br>

<button onclick="addMarkerDMS()">OK DMS</button>

</div>
</div>

<!-- UPLOAD -->
<div id="uploadPanel" class="dropdown">
<div class="panel-header">My Location</div>
<div class="panel-body">
CSV <input type="file" id="csvFile"><br>
<button onclick="loadCSV()">Load CSV</button><br><br>
GeoJSON <input type="file" id="geojsonFile"><br>
<button onclick="loadGeoJSON()">Load GeoJSON</button>
</div>
</div>

<!-- LAYER -->
<div id="layerPanel" class="panel">
<div class="panel-header">Layers & Basemap</div>
<div class="panel-body" id="layerList"></div>
</div>

<!-- LEGEND -->
<div id="legend" class="panel">
<div class="panel-header">Legenda</div>
<div class="panel-body" id="legendContent">Belum ada layer aktif</div>
</div>

<!-- MINIMAP -->
<div id="minimapPanel" class="panel">
<div class="panel-header">Mini Map</div>
<div id="miniMap" style="height:130px;"></div>
</div>

<!-- HELP -->
<div id="helpPanel" class="panel" style="right:20px; left:auto;">
<div class="panel-header">Help</div>
<div class="panel-body">
- Search lokasi<br>
- Input DD / DMS<br>
- Upload CSV / GeoJSON<br>
- Draw: digitasi objek<br>
- Measure: otomatis hitung<br>
</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script>

// MAP
const map = L.map('map').setView([-2.5,118],5);

const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

const topomap = L.tileLayer(
  'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
  { attribution: '© OpenTopoMap' }
);

const voyager = L.tileLayer(
'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
{
 attribution:'© CARTO'
});
voyager.addTo(map);
  
const oceanBase = L.tileLayer(
'https://services.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}'
);

const oceanRef = L.tileLayer(
'https://services.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}'
);
  
const worldOcean = L.tileLayer(
  'https://services.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}',
  { attribution: '© Esri Ocean Basemap' }
);

const baseLayers = [
  osm,
  sat,
  topomap,
  voyager,
  oceanBase,
  oceanRef,
  worldOcean
];

// ======================
// STYLE KLASIFIKASI
// ======================

const fungsiStyle = {

  "hunian":{
    fill:"#7B1FA2",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "perikanan":{
    fill:"#19A1D2",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "pergaraman":{
    fill:"#F5F5F5",
    outline:"#616161",
    icon:"#000000"
  },

  "wisata bahari":{
    fill:"#00BCD4",
    outline:"#212121",
    icon:"#000000"
  },

  "pelayaran":{
    fill:"#1565C0",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "perhubungan darat":{
    fill:"#8D6E63",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "telekomunikasi":{
    fill:"#C2185B",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "pengamanan pantai":{
    fill:"#757575",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "migas":{
    fill:"#212121",
    outline:"#BDBDBD",
    icon:"#FFFFFF"
  },

  "pertambangan":{
    fill:"#6D4C41",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "ketenagalistrikan":{
    fill:"#F9A825",
    outline:"#212121",
    icon:"#000000"
  },

  "data & penelitian":{
    fill:"#42A5F5",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "pertahanan":{
    fill:"#B71C1C",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "sumber daya air":{
    fill:"#26C6DA",
    outline:"#212121",
    icon:"#000000"
  },

  "air laut non-energi":{
    fill:"#00897B",
    outline:"#212121",
    icon:"#FFFFFF"
  },

  "belum diketahui":{
    fill:"#90A4AE",
    outline:"#212121",
    icon:"#000000"
  },

    "belum teridentifikasi":{
    fill:"#90A4AE",
    outline:"#212121",
    icon:"#000000"
  },

  "data lainnya":{
    fill:"#90A4AE",
    outline:"#212121",
    icon:"#000000"
  },

};


// ======================
// GEOJSON LAYER
// ======================

const fungsiLayer = L.geoJSON(null,{

  // style polygon & line
  style:function(feature){

    const fungsi = feature.properties.FBANGLA;
    const s = fungsiStyle[fungsi] || fungsiStyle["data lainnya"];

    return {
      color:s.outline,
      weight:2,
      fillColor:s.fill,
      fillOpacity:0.7
    };
  },

  // style point
  pointToLayer:function(feature,latlng){

    const jenis = feature.properties.FBANGLA;
    const s = fungsiStyle[jenis] || fungsiStyle["data lainnya"];

    return L.circleMarker(latlng,{
      radius:7,
      fillColor:s.fill,
      color:s.outline,
      weight:2,
      opacity:1,
      fillOpacity:1
    });

  },

  // popup
  onEachFeature:function(feature,layer){

    let html = "";

    if(feature.properties){

      for(const key in feature.properties){

        html += "<b>"+key+"</b>: "
              + feature.properties[key]
              + "<br>";

      }

    }

    layer.bindPopup(html);

  }

});


// ======================
// LOAD GEOJSON
// ======================

fetch('Bangla_2025_PT.geojson')

.then(r=>r.json())

.then(data=>{

  fungsiLayer.addData(data);

});


// ======================
// TAMBAH KE MENU LAYER
// ======================

layerList.innerHTML +=
  '<hr>' +
  '<b>Operational Layer</b><br>' +
  '<input type="checkbox" checked onclick="togglebanglaLayer(this)"> Bangunan dan Instalasi di Laut (2025)<br>';


// ======================
// TOGGLE LAYER
// ======================

function togglebanglaLayer(el){

  if(el.checked){

    map.addLayer(fungsiLayer);

  } else {

    map.removeLayer(fungsiLayer);

  }

}


// tampil default
fungsiLayer.addTo(map);

//End off layer part
  
// SCALE (lebih panjang)
L.control.scale({
  maxWidth:200,
  metric:true,
  imperial:false
}).addTo(map);

// COMPASS (clean)
const compass = L.control({position:"bottomleft"});
compass.onAdd = function(){
  const div = L.DomUtil.create("div");

  div.innerHTML = `
  <svg width="70" height="70" viewBox="0 0 100 100">
    <polygon points="50,5 60,50 50,45 40,50" fill="black"/>
    <text x="50" y="90" text-anchor="middle" font-size="20" font-weight="bold">N</text>
  </svg>
  `;

  div.style.background = "transparent";
  div.style.marginBottom = "20px";

  return div;
};
compass.addTo(map);

// SEARCH
searchBox.addEventListener("keypress", e=>{
  if(e.key==="Enter") searchLocation();
});
async function searchLocation(){
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${searchBox.value}`);
  const d = await res.json();
  if(d.length) map.setView([d[0].lat,d[0].lon],12);
}

// DRAW + CATATAN
const drawnItems = new L.FeatureGroup().addTo(map);

const drawControl = new L.Control.Draw({
  edit:{featureGroup:drawnItems},
  draw:{polygon:true, polyline:true, rectangle:true, marker:true}
});
map.addControl(drawControl);

map.on(L.Draw.Event.CREATED, e=>{
  const layer = e.layer;
  const note = prompt("Nama objek / catatan:");

  let info = note ? note+"<br>" : "";

if(layer instanceof L.Polygon){
  const area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);

  let luasText = "";

  if(area < 10000){
    luasText = area.toFixed(0) + " m²";
  }
  else if(area < 10000000){
    luasText = (area/10000).toFixed(2) + " ha";
  }
  else{
    luasText = (area/1000000).toFixed(2) + " km²";
  }

  info += "Luas: " + luasText;
}

  layer.bindPopup(info).openPopup();
  drawnItems.addLayer(layer);
});

// INPUT
function addMarkerDD(){
  const lat=+latInput.value,lng=+lngInput.value;
  if(isNaN(lat) || isNaN(lng)) return;

  L.marker([lat,lng]).addTo(drawnItems);
  map.setView([lat,lng],12);

  // tutup dropdown/panel
  document.getElementById("inputPanel").style.display = "none";
}

function dms(d,m,s,dir){return dir*(Math.abs(d)+(m/60)+(s/3600));}

function addMarkerDMS(){
  const lat=dms(+latDeg.value,+latMin.value,+latSec.value,+latDir.value);
  const lng=dms(+lngDeg.value,+lngMin.value,+lngSec.value,+lngDir.value);

  L.marker([lat,lng]).addTo(drawnItems);
  map.setView([lat,lng],12);

  document.getElementById("inputPanel").style.display = "none";
}

// UPLOAD
function loadCSV(){
  const file = document.getElementById("csvFile").files[0];
  if(!file) return alert("Pilih file CSV dulu");

  const r = new FileReader();
  r.onload = e => {
    const bounds = [];
    e.target.result.split("\n").forEach(line=>{
      const [lat,lng] = line.trim().split(",");
      if(!isNaN(lat) && !isNaN(lng)){
        const m = L.marker([+lat,+lng]).addTo(drawnItems);
        bounds.push([+lat,+lng]);
      }
    });

    if(bounds.length){
      map.fitBounds(bounds);
    }
  };
  r.readAsText(file);
  document.getElementById("uploadPanel").style.display = "none";
}

function loadGeoJSON(){
  const file = document.getElementById("geojsonFile").files[0];
  if(!file) return alert("Pilih file GeoJSON");

  const r = new FileReader();
  r.onload = e=>{
    const data = JSON.parse(e.target.result);
    const layer = L.geoJSON(data).addTo(drawnItems);

    if(layer.getBounds().isValid()){
      map.fitBounds(layer.getBounds());
    }
  };
  r.readAsText(file);
  document.getElementById("uploadPanel").style.display = "none";
}

// BASEMAP MENU
layerList.innerHTML +=
  '<b>Basemap</b><br>' +
  '<input type="radio" name="bm" checked onclick="setBasemap(\'voyager\')"> Voyager<br>' +
  '<input type="radio" name="bm" onclick="setBasemap(\'osm\')"> OSM<br>' +
  '<input type="radio" name="bm" onclick="setBasemap(\'worldOcean\')"> WorldOcean<br>' +
  '<input type="radio" name="bm" onclick="setBasemap(\'sat\')"> Satellite<br>' +
  '<hr>' +
  '<b>Layer (coming soon)</b>';

function setBasemap(type){

  // hapus semua basemap dulu
  baseLayers.forEach(layer=>{
    if(map.hasLayer(layer)){
      map.removeLayer(layer);
    }
  });

  // aktifkan sesuai pilihan
  if(type==='osm') map.addLayer(osm);

  if(type==='sat')
    map.addLayer(sat);

  if(type==='topomap')
    map.addLayer(topomap);

  if(type==='voyager')
    map.addLayer(voyager);

  if(type==='oceanBase')
    map.addLayer(oceanBase);

  if(type==='oceanRef')
    map.addLayer(oceanRef);

  if(type==='worldOcean'){
    map.addLayer(worldOcean);
    map.addLayer(oceanRef); // label laut
  }
}
  
// MINIMAP
const miniMap=L.map('miniMap',{zoomControl:false,attributionControl:false});
miniMap.setView([-2.5,118],3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);

let rect=L.rectangle(map.getBounds(),{color:'red',weight:2,fill:false}).addTo(miniMap);
map.on('move',()=>rect.setBounds(map.getBounds()));

setTimeout(()=>miniMap.invalidateSize(),500);

map.on('move',()=>{
  rect.setBounds(map.getBounds());
  miniMap.invalidateSize();
});

new ResizeObserver(() => miniMap.invalidateSize())
  .observe(document.getElementById("miniMap"));
  
// UI
function toggle(id){

  const el = document.getElementById(id);

  const current =
    window.getComputedStyle(el).display;

  if(current === "none"){
    el.style.display = "block";
  }else{
    el.style.display = "none";
  }

  if(id==="minimapPanel"){
    setTimeout(()=>{
      miniMap.invalidateSize();
    },300);
  }
}

function resetAll(){ drawnItems.clearLayers(); }

// DRAG
document.querySelectorAll('.panel').forEach(el=>{
  const h=el.querySelector('.panel-header');

  h.onmousedown = startDrag;
  h.ontouchstart = startDrag;

  function startDrag(e){
    const isTouch = e.type === "touchstart";
    const startX = isTouch ? e.touches[0].clientX : e.clientX;
    const startY = isTouch ? e.touches[0].clientY : e.clientY;

    let x = startX - el.offsetLeft;
    let y = startY - el.offsetTop;

    function move(e){
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      let left = clientX - x;
      let top = clientY - y;

      // batas layar
      left = Math.max(0, Math.min(window.innerWidth - el.offsetWidth, left));
      top = Math.max(0, Math.min(window.innerHeight - el.offsetHeight, top));

      el.style.left = left + "px";
      el.style.top = top + "px";
    }

    function stop(){
      document.onmousemove = null;
      document.ontouchmove = null;
    }

    document.onmousemove = move;
    document.ontouchmove = move;
    document.onmouseup = stop;
    document.ontouchend = stop;
  }
});

</script>

</body>
</html>
