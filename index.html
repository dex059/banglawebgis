<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SiBangLa WebGIS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height: 90vh; }

/* TOP BAR */
.topbar {
  display:flex;
  background:#3b6db3;
  color:white;
  padding:6px;
  gap:10px;
  align-items:center;
}
.topbar input, .topbar select {
  padding:4px;
}

/* PANEL */
.panel {
  position:absolute;
  background:white;
  padding:10px;
  border-radius:6px;
  box-shadow:0 0 6px rgba(0,0,0,0.3);
  z-index:1000;
  cursor:move;
}

/* LEGEND */
.legend { bottom:20px; left:20px; }

/* HELP */
.help { top:80px; right:20px; display:none; }

/* MINIMAP */
.minimap {
  width:200px;
  height:150px;
  top:80px;
  left:20px;
}

/* DROPDOWN */
.dropdown { display:none; background:white; padding:10px; }

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

  🔍 <input type="text" id="searchBox" placeholder="Find location">

  ▶ Input Point
  <button onclick="toggle('inputPanel')">▼</button>

  ▶ My Location
  <button onclick="toggle('uploadPanel')">▼</button>

  <button onclick="toggle('miniMapPanel')">Mini Map</button>
  <button onclick="toggle('legend')">Legend</button>
  <button onclick="toggle('helpPanel')">Info/Help</button>

</div>

<!-- MAP -->
<div id="map"></div>

<!-- INPUT PANEL -->
<div id="inputPanel" class="panel" style="top:80px; left:250px; display:none;">

  <b>Decimal Degree</b><br>
  Lat: <input id="lat"><br>
  Lng: <input id="lng"><br>
  <button onclick="addMarker()">Tambah</button>

  <hr>

  <b>DMS</b><br>
  Lat:
  <select id="latDir"><option value="1">N</option><option value="-1">S</option></select>
  <input id="latDeg" size="3">°
  <input id="latMin" size="3">' 
  <input id="latSec" size="3">"<br>

  Lng:
  <select id="lngDir"><option value="1">E</option><option value="-1">W</option></select>
  <input id="lngDeg" size="3">°
  <input id="lngMin" size="3">' 
  <input id="lngSec" size="3">"<br>

  <button onclick="addDMS()">Tambah DMS</button>

</div>

<!-- UPLOAD PANEL -->
<div id="uploadPanel" class="panel" style="top:80px; left:450px; display:none;">

  <b>Upload CSV</b><br>
  <input type="file" id="csv"><br>
  <button onclick="loadCSV()">Load</button>

  <hr>

  <b>Upload GeoJSON</b><br>
  <input type="file" id="geojson"><br>
  <button onclick="loadGeoJSON()">Load</button>

</div>

<!-- LEGEND -->
<div id="legend" class="panel legend">
<b>Legenda</b><br>
<div><span style="background:red;width:12px;height:12px;display:inline-block"></span> KPBPB</div>
<div><span style="background:blue;width:12px;height:12px;display:inline-block"></span> KSN</div>
</div>

<!-- MINIMAP -->
<div id="miniMapPanel" class="panel minimap"></div>

<!-- HELP -->
<div id="helpPanel" class="panel help">
<b>Info Penggunaan</b><br>
- Search lokasi pakai kolom atas<br>
- Input titik via DD atau DMS<br>
- Upload CSV format: lat,lng<br>
- GeoJSON bisa point/area<br>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>

const map = L.map('map').setView([-2.5,118],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// SEARCH NOMINATIM
const geocoder = L.Control.geocoder({ defaultMarkGeocode:false })
.on('markgeocode', function(e) {
  map.fitBounds(e.geocode.bbox);
}).addTo(map);

// manual trigger search
document.getElementById("searchBox").addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    geocoder.options.geocoder.geocode(e.target.value, res=>{
      if(res.length){
        map.fitBounds(res[0].bbox);
      }
    });
  }
});

// MARKER
function addMarker(){
  let lat = parseFloat(document.getElementById("lat").value);
  let lng = parseFloat(document.getElementById("lng").value);
  L.marker([lat,lng]).addTo(map);
}

// DMS
function dms(deg,min,sec,dir){
  return dir*(deg + min/60 + sec/3600);
}
function addDMS(){
  let lat = dms(
    +latDeg.value, +latMin.value, +latSec.value, +latDir.value
  );
  let lng = dms(
    +lngDeg.value, +lngMin.value, +lngSec.value, +lngDir.value
  );
  L.marker([lat,lng]).addTo(map);
}

// CSV
function loadCSV(){
  let file = document.getElementById("csv").files[0];
  let reader = new FileReader();
  reader.onload = e=>{
    e.target.result.split("\n").forEach(l=>{
      let [lat,lng]=l.split(",");
      if(lat && lng) L.marker([lat,lng]).addTo(map);
    });
  };
  reader.readAsText(file);
}

// GEOJSON
function loadGeoJSON(){
  let file = document.getElementById("geojson").files[0];
  let reader = new FileReader();
  reader.onload = e=>{
    L.geoJSON(JSON.parse(e.target.result)).addTo(map);
  };
  reader.readAsText(file);
}

// TOGGLE PANEL
function toggle(id){
  let el = document.getElementById(id);
  el.style.display = (el.style.display==="none")?"block":"none";
}

// DRAG PANEL
document.querySelectorAll(".panel").forEach(el=>{
  el.onmousedown = function(e){
    let shiftX = e.clientX - el.getBoundingClientRect().left;
    let shiftY = e.clientY - el.getBoundingClientRect().top;
    function moveAt(pageX, pageY){
      el.style.left = pageX - shiftX + 'px';
      el.style.top = pageY - shiftY + 'px';
    }
    function onMouseMove(e){
      moveAt(e.pageX, e.pageY);
    }
    document.addEventListener('mousemove', onMouseMove);
    document.onmouseup = ()=>{
      document.removeEventListener('mousemove', onMouseMove);
    };
  };
});

// MINIMAP
const miniMap = L.map('miniMapPanel',{
  attributionControl:false,
  zoomControl:false
}).setView([-2.5,118],3);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(miniMap);

map.on('move', ()=>{
  miniMap.setView(map.getCenter(), map.getZoom()-2);
});

</script>

</body>
</html>
