<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SiBangLa WebGIS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:Segoe UI; }
#map { height:92vh; }

/* TOPBAR */
.topbar {
  display:flex; gap:8px; padding:8px;
  background:#3f6fb5; color:white;
}
.topbar input { padding:5px; border:none; border-radius:4px; }
.btn {
  background:rgba(255,255,255,0.15);
  border:none; color:white; padding:6px 10px;
  border-radius:4px; cursor:pointer;
}
.btn:hover { background:rgba(255,255,255,0.3); }

/* PANEL */
.panel {
  position:absolute;
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
  z-index:1000;
  font-size:13px;
  cursor:move;
}

/* POSISI */
#legend { bottom:15px; left:15px; }
#minimapPanel { width:200px; height:150px; top:100px; left:20px; display:none; }
#layerPanel { top:100px; right:20px; }
</style>
</head>

<body>

<div class="topbar">
  🔍 <input id="searchBox" placeholder="Find location">
  <button class="btn" onclick="searchLocation()">Search</button>

  <button class="btn" onclick="toggle('inputPanel')">Input Point</button>
  <button class="btn" onclick="toggleBasemap()">Basemap</button>
  <button class="btn" onclick="toggle('layerPanel')">Layer</button>
  <button class="btn" onclick="toggle('minimapPanel')">Mini Map</button>
  <button class="btn" onclick="resetAll()">Reset</button>
</div>

<div id="map"></div>

<!-- INPUT -->
<div id="inputPanel" class="panel" style="top:100px; left:200px; display:none;">
Lat <input id="lat"> Lng <input id="lng">
<button onclick="addMarker()">OK</button>
</div>

<!-- LAYER -->
<div id="layerPanel" class="panel">
<b>Layer</b><br>
<label><input type="checkbox" checked onchange="toggleLayerGeo('KAW')"> KAW</label><br>
<label><input type="checkbox" checked onchange="toggleLayerGeo('Prov')"> Perairan</label>
</div>

<!-- LEGEND -->
<div id="legend" class="panel"></div>

<!-- MINIMAP -->
<div id="minimapPanel" class="panel"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script>

// ================= MAP =================
const map = L.map('map').setView([-2.5,118],5);

// basemap
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
let currentBase = osm;

function toggleBasemap(){
  map.removeLayer(currentBase);
  currentBase = currentBase===osm ? sat : osm;
  map.addLayer(currentBase);
}

// scale bar
L.control.scale().addTo(map);

// ================= SEARCH (NOMINATIM) =================
async function searchLocation(){
  const q = document.getElementById('searchBox').value;
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
  const data = await res.json();
  if(data.length){
    map.setView([data[0].lat, data[0].lon], 12);
  }
}

// ================= DRAW =================
const drawnItems = new L.FeatureGroup().addTo(map);

map.addControl(new L.Control.Draw({
  edit:{featureGroup:drawnItems},
  draw:{polygon:true, polyline:true, marker:false}
}));

map.on('draw:created', e=>{
  drawnItems.addLayer(e.layer);
});

// ================= INPUT POINT =================
function addMarker(){
  const lat = +lat.value;
  const lng = +lng.value;
  const m = L.marker([lat,lng]).addTo(drawnItems);
  map.setView([lat,lng], 12);
}

// ================= GEOJSON LAYER =================
const geoLayers = {
  "KAW": L.geoJSON(null, {style:{color:'blue'}}),
  "Prov": L.geoJSON(null, {style:{color:'red'}})
};

// contoh load (ganti URL kamu)
fetch('07_KAW_simplified.json')
.then(r=>r.json())
.then(d=>geoLayers["KAW"].addData(d).addTo(map));

fetch('06_Perairan_Prov_simplified.json')
.then(r=>r.json())
.then(d=>geoLayers["Prov"].addData(d).addTo(map));

function toggleLayerGeo(name){
  if(map.hasLayer(geoLayers[name])){
    map.removeLayer(geoLayers[name]);
  } else {
    map.addLayer(geoLayers[name]);
  }
  updateLegend();
}

// ================= LEGEND DINAMIS =================
function updateLegend(){
  let html = "<b>Legenda</b><br>";
  if(map.hasLayer(geoLayers["KAW"])) html += "■ KAW<br>";
  if(map.hasLayer(geoLayers["Prov"])) html += "■ Perairan<br>";
  document.getElementById("legend").innerHTML = html;
}
updateLegend();

// ================= MINIMAP =================
const miniMap = L.map('minimapPanel',{zoomControl:false, attributionControl:false})
.setView([-2.5,118],3);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);

let rect = L.rectangle(map.getBounds(),{color:'red'}).addTo(miniMap);

map.on('move', ()=>{
  miniMap.setView(map.getCenter(), map.getZoom()-2);
  rect.setBounds(map.getBounds());
});

// ================= RESET =================
function resetAll(){
  drawnItems.clearLayers();
}

// ================= DRAG PANEL =================
document.querySelectorAll('.panel').forEach(el=>{
  el.onmousedown = e=>{
    let x = e.clientX - el.offsetLeft;
    let y = e.clientY - el.offsetTop;
    document.onmousemove = e=>{
      el.style.left = e.clientX - x + "px";
      el.style.top = e.clientY - y + "px";
    };
    document.onmouseup = ()=> document.onmousemove=null;
  };
});

// ================= TOGGLE =================
function toggle(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display==="none"?"block":"none";
}

</script>

</body>
</html>
